services:
  - type: web
    name: campuscart-web
    runtime: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_NAME
        value: ecommerce_db
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
